services:
  - type: web
    name: renature-api
    runtime: node
    plan: free
    rootDir: renature-backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/status
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: EMAIL_USER
        sync: false
      - key: BREVO_API_KEY
        sync: false
